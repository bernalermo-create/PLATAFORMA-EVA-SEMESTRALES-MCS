<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma de Evaluación — Colegio Miguel de Cervantes Saavedra I.E.D.</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a8a">
<link rel="stylesheet" href="styles.css">
<!-- Lectura de listas de estudiantes desde Excel, sin backend -->
<!-- Todas estas librerías se alojan localmente en vendor/ (en vez de
     un CDN externo) — así escanear, generar QR, importar Excel/PDF no
     dependen de que cdnjs esté disponible en la red del celular/colegio
     en ese momento. Esto fue justo lo que falló en producción
     ("No se pudo cargar el lector de QR"). -->
<script src="vendor/xlsx.full.min.js"></script>
<!-- Generación de QR en cliente, sin backend -->
<script src="vendor/qrcode.min.js"></script>
<!-- Lectura de QR desde la cámara, sin backend -->
<script src="vendor/jsQR.js"></script>
<!-- Extracción de texto de PDF en cliente, para importar evaluaciones ya escritas en Word/PDF -->
<script src="vendor/pdf.min.js"></script>
</head>
<body>
  <div id="s-login">
    <div class="login-box">
      <img src="icon-192.png" alt="Escudo" class="login-logo">
      <div class="login-title">Plataforma de Evaluación</div>
      <div class="login-sub">Colegio Miguel de Cervantes Saavedra I.E.D.</div>

      <div class="role-tabs">
        <button type="button" id="rtab-admin" class="role-tab on" onclick="selectLoginRole('admin')">👑 Admin</button>
        <button type="button" id="rtab-docente" class="role-tab" onclick="selectLoginRole('docente')">📚 Docente</button>
      </div>

      <div class="login-field"><input id="login-user" placeholder="Usuario administrador" autocomplete="username"></div>
      <div class="login-field"><input id="login-pwd" type="password" placeholder="Contraseña" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')window.doLogin()"></div>

      <button class="login-btn" onclick="window.doLogin()">Entrar</button>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>

  <header class="topbar hidden" id="topbar">
    <div class="brand">
      <img src="icon-192.png" alt="Escudo" class="brand-icon-img">
      <div>
        <strong>Plataforma de Evaluación</strong>
        <div class="brand-sub">Colegio Miguel de Cervantes Saavedra I.E.D.</div>
      </div>
    </div>
    <nav class="mainnav" id="mainnav">
      <a href="#/dashboard" data-route="dashboard">📊 Dashboard</a>
      <a href="#/institucional" data-route="institucional">🏛️ Institucional</a>
      <a href="#/docentes" data-route="docentes">👤 Docentes</a>
      <a href="#/evaluaciones" data-route="evaluaciones">📝 Evaluaciones</a>
      <a href="#/hojas" data-route="hojas">🧾 Hojas / QR</a>
      <a href="#/escaneo" data-route="escaneo">📷 Escaneo</a>
      <a href="#/resultados" data-route="resultados">📈 Resultados</a>
      <a href="#/analisis" data-route="analisis">📊 Análisis</a>
      <a href="#/config" data-route="config">⚙️ Configuración</a>
    </nav>
    <div style="display:flex;align-items:center;gap:.6rem">
      <button class="btn sm sec" id="theme-toggle" title="Cambiar tema">🌙</button>
      <span id="user-badge" class="sync-badge"></span>
      <span id="sync-badge" class="sync-badge sync-idle">● Local</span>
      <button class="btn sm sec" onclick="window.doLogout()">Salir</button>
    </div>
  </header>

  <main id="app" class="app hidden"></main>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
